services:
  - type: web
    name: agrisense-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2 --log-level info
    envVars:
      - key: PORT
        value: "5000"
      - key: CORS_ORIGINS
        value: "https://agrisense-frontend.vercel.app"
      - key: ANTHROPIC_API_KEY
        sync: false